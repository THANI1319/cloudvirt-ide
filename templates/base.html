<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="particles-js"></div>

    <nav class="navbar navbar-expand-lg fixed-top glass-nav">
        <div class="container">
            <a class="navbar-brand fw-bold text-glow" href="/"><i class="fas fa-microchip pulse-anim"></i> CloudVirt Nexus</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto text-uppercase">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/concepts">Concepts</a></li>
                    <li class="nav-item"><a class="nav-link" href="/ide">Live IDE</a></li>
                    <li class="nav-item"><a class="nav-link" href="/analytics">Analytics</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">About Team</a></li>
                    <li class="nav-item"><a class="nav-link text-warning" href="/history"><i class="fas fa-history"></i> Run History</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div style="min-height: 85vh;">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer bg-black py-4 blur-footer border-top border-dark mt-auto">
        <div class="container text-center text-secondary">
            <p class="mb-0 small text-muted">© 2026 CloudVirt Nexus Pro. Performance Virtualization Domain | Batch 20.</p>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
